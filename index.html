<!DOCTYPE html>
<html>
<head>
  <title>Credit Sass Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial;margin:0;background:#f2f4f8}
    .box{max-width:500px;margin:auto;padding:20px}
    input,button{width:100%;padding:10px;margin-top:10px}
    button{background:#4CAF50;color:white;border:none}
    .card{background:white;padding:10px;margin-top:10px;border-radius:10px}
    .logout{background:red}
  </style>
</head>
<body>

<div class="box">

<!-- AUTH -->
<div id="authSection">
  <h2>Login / Register</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- SUBSCRIPTION -->
<div id="subscriptionPage" style="display:none;text-align:center">
  <h2>Subscription Required</h2>
  <p>₹99 / Month</p>
  <p>Pay UPI: abu733207@icici</p>
  <button onclick="contactOwner()">I Have Paid</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <h2>Credit Dashboard</h2>

  <input type="text" id="customerName" placeholder="Customer Name">
  <button onclick="addCustomer()">Add Customer</button>

  <div id="customerList"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjKRBcESWqw17af_TQ8h5RtRz4pRFvcvs",
  authDomain: "credit-sass.firebaseapp.com",
  databaseURL: "https://credit-sass-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "credit-sass",
  storageBucket: "credit-sass.firebasestorage.app",
  messagingSenderId: "820767773664",
  appId: "1:820767773664:web:4eb034cdaaea029fc95185"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

let currentUser = null;

window.register = () => {
  createUserWithEmailAndPassword(auth,email.value,password.value)
  .then((userCredential)=>{
     const uid = userCredential.user.uid;
     set(ref(database,'Users/'+uid+'/subscription'),{
        active:false,
        expiry:""
     });
     alert("Registered Successfully");
  })
  .catch(err=>alert(err.message));
}

window.login = () => {
  signInWithEmailAndPassword(auth,email.value,password.value)
  .catch(err=>alert(err.message));
}

window.logout = () => signOut(auth);

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;

    const subRef = ref(database,'Users/'+user.uid+'/subscription');
    onValue(subRef,snap=>{
       const sub = snap.val();

       if(!sub || sub.active == false){
          showSubscriptionPage();
       } else {
          const today = new Date();
          const expiryDate = new Date(sub.expiry);

          if(today > expiryDate){
             update(subRef,{active:false});
             showSubscriptionPage();
          } else {
             authSection.style.display="none";
             subscriptionPage.style.display="none";
             dashboard.style.display="block";
             loadCustomers();
          }
       }
    },{onlyOnce:true});
  }
  else{
    authSection.style.display="block";
    dashboard.style.display="none";
    subscriptionPage.style.display="none";
  }
});

function showSubscriptionPage(){
  authSection.style.display="none";
  dashboard.style.display="none";
  subscriptionPage.style.display="block";
}

window.contactOwner = ()=>{
  const msg = "I have paid ₹99 subscription. Please activate my account.";
  const url = "https://wa.me/918116410029?text="+encodeURIComponent(msg);
  window.open(url,"_blank");
}

window.addCustomer = ()=>{
  if(!customerName.value) return;
  push(ref(database,'Users/'+currentUser.uid+'/Customers'),{
    name:customerName.value,
    totalCredit:0,
    totalPaid:0,
    lastPaymentDate:"-"
  });
  customerName.value="";
}

function loadCustomers(){
  const customerRef = ref(database,'Users/'+currentUser.uid+'/Customers');
  onValue(customerRef,snap=>{
    const data = snap.val();
    customerList.innerHTML="";
    if(!data) return;

    for(let id in data){
      const c=data[id];
      const balance=(c.totalCredit||0)-(c.totalPaid||0);

      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <h3>${c.name}</h3>
        <p>Balance: ₹${balance}</p>
        <input type="number" id="amt_${id}" placeholder="Amount">
        <button onclick="addCredit('${id}')">Credit</button>
        <button onclick="addPaid('${id}')">Paid</button>
        <button onclick="sendWA('${id}')">WhatsApp</button>
      `;
      customerList.appendChild(card);
    }
  });
}

window.addCredit=id=>{
  const amt=parseInt(document.getElementById("amt_"+id).value);
  if(!amt) return;
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers/'+id);
  onValue(custRef,snap=>{
    const c=snap.val();
    update(custRef,{
      totalCredit:(c.totalCredit||0)+amt,
      lastPaymentDate:new Date().toLocaleDateString()
    });
  },{onlyOnce:true});
}

window.addPaid=id=>{
  const amt=parseInt(document.getElementById("amt_"+id).value);
  if(!amt) return;
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers/'+id);
  onValue(custRef,snap=>{
    const c=snap.val();
    update(custRef,{
      totalPaid:(c.totalPaid||0)+amt,
      lastPaymentDate:new Date().toLocaleDateString()
    });
  },{onlyOnce:true});
}

window.sendWA=id=>{
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers/'+id);
  onValue(custRef,snap=>{
    const c=snap.val();
    const balance=(c.totalCredit||0)-(c.totalPaid||0);
    if(balance>0){
      const msg=`Hello ${c.name}, your pending balance is ₹${balance}`;
      window.open("https://wa.me/?text="+encodeURIComponent(msg));
    }
  },{onlyOnce:true});
}

</script>
</body>
</html>
