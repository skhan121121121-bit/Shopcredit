<!DOCTYPE html>
<html>
<head>
  <title>Credit App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>Credit App</h2>

<div id="loginDiv">
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="message"></p>
</div>

<div id="dashboard" style="display:none;">
  <h3>Add Customer</h3>
  <input type="text" id="custName" placeholder="Customer Name"><br><br>
  <input type="text" id="custPhone" placeholder="Phone"><br><br>
  <button onclick="addCustomer()">Add Customer</button>

  <h3>Customer List</h3>
  <ul id="customerList"></ul>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  import { getDatabase, ref, set, push, onValue }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjKRBcESWqw17af_TQ8h5RtRz4pRFvcvs",
    authDomain: "credit-sass.firebaseapp.com",
    databaseURL: "https://credit-sass-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "credit-sass",
    storageBucket: "credit-sass.firebasestorage.app",
    messagingSenderId: "820767773664",
    appId: "1:820767773664:web:4eb034cdaaea029fc95185"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const database = getDatabase(app);

  let currentUser;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById("loginDiv").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadCustomers();
    } else {
      document.getElementById("loginDiv").style.display = "block";
      document.getElementById("dashboard").style.display = "none";
    }
  });

  window.register = function () {
    const email = email.value;
    const password = password.value;

    createUserWithEmailAndPassword(auth, email, password)
      .catch((error) => alert(error.message));
  }

  window.login = function () {
    const email = email.value;
    const password = password.value;

    signInWithEmailAndPassword(auth, email, password)
      .catch((error) => alert(error.message));
  }

  window.logout = function () {
    signOut(auth);
  }

  window.addCustomer = function () {
    const name = custName.value;
    const phone = custPhone.value;

    push(ref(database, 'Users/' + currentUser.uid + '/Customers'), {
      name: name,
      phone: phone,
      totalCredit: 0,
      totalPaid: 0,
      lastPaymentDate: "-"
    });

    custName.value = "";
    custPhone.value = "";
  }

  function loadCustomers() {
    const customerRef = ref(database, 'Users/' + currentUser.uid + '/Customers');

    onValue(customerRef, (snapshot) => {
      const data = snapshot.val();
      const list = document.getElementById("customerList");
      list.innerHTML = "";

      for (let id in data) {
        const customer = data[id];
        const balance = customer.totalCredit - customer.totalPaid;

        list.innerHTML += `
          <li>
            ${customer.name} |
            Balance: ₹${balance} |
            Last Payment: ${customer.lastPaymentDate}
          </li>
        `;
      }
    });
  }
</script>

</body>
</html>
