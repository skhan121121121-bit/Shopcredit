<!DOCTYPE 
<html>
<head>
  <title>Credit App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>Credit App</h2>

<!-- LOGIN SECTION -->
<div id="loginSection">
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password (min 6 char)"><br><br>
  <button id="registerBtn">Register</button>
  <button id="loginBtn">Login</button>
  <p id="message"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <h3>Add Customer</h3>
  <input type="text" id="custName" placeholder="Customer Name">
  <input type="text" id="custPhone" placeholder="Phone">
  <button id="addCustomerBtn">Add Customer</button>

  <hr>

  <h3>Search Customer</h3>
  <input type="text" id="searchInput" placeholder="Search by Name">
  <button id="searchBtn">Search</button>

  <hr>

  <h3>Bulk Payment (All Customers)</h3>
  <input type="number" id="bulkAmount" placeholder="Amount">
  <button id="bulkCreditBtn">Add Credit to All</button>
  <button id="bulkDebitBtn">Add Paid to All</button>

  <hr>

  <h3>Customer List</h3>
  <ul id="customerList"></ul>

  <button id="logoutBtn">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  signOut,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getDatabase, 
  ref, 
  push, 
  onValue,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjKRBcESWqw17af_TQ8h5RtRz4pRFvcvs",
  authDomain: "credit-sass.firebaseapp.com",
  databaseURL: "https://credit-sass-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "credit-sass",
  storageBucket: "credit-sass.firebasestorage.app",
  messagingSenderId: "820767773664",
  appId: "1:820767773664:web:4eb034cdaaea029fc95185"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

let currentUser = null;

/* ---------- AUTH ---------- */

registerBtn.onclick = () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .catch(error => alert(error.message));
};

loginBtn.onclick = () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .catch(error => alert(error.message));
};

logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    loginSection.style.display = "none";
    dashboard.style.display = "block";
    loadCustomers();
  } else {
    loginSection.style.display = "block";
    dashboard.style.display = "none";
  }
});

/* ---------- ADD CUSTOMER ---------- */

addCustomerBtn.onclick = () => {
  const name = custName.value;
  const phone = custPhone.value;

  if (!name) return alert("Name required");

  push(ref(database, 'Users/' + currentUser.uid + '/Customers'), {
    name: name,
    phone: phone,
    totalCredit: 0,
    totalPaid: 0,
    lastPaymentDate: "-"
  });

  custName.value = "";
  custPhone.value = "";
};

/* ---------- LOAD CUSTOMERS ---------- */

function loadCustomers() {
  const customerRef = ref(database, 'Users/' + currentUser.uid + '/Customers');

  onValue(customerRef, (snapshot) => {
    const data = snapshot.val();
    customerList.innerHTML = "";

    if (!data) return;

    for (let id in data) {
      const c = data[id];
      const balance = (c.totalCredit || 0) - (c.totalPaid || 0);

      const li = document.createElement("li");
      li.innerHTML = `
        <b>${c.name}</b> |
        Balance: ₹${balance} |
        Last Payment: ${c.lastPaymentDate}
        <br>
        <input type="number" id="amt_${id}" placeholder="Amount">
        <button onclick="addCredit('${id}')">Credit</button>
        <button onclick="addDebit('${id}')">Paid</button>
        <hr>
      `;
      customerList.appendChild(li);
    }
  });
}

/* ---------- INDIVIDUAL PAYMENT ---------- */

window.addCredit = function(id) {
  const amount = parseInt(document.getElementById("amt_" + id).value);
  if (!amount) return alert("Enter amount");

  const refPath = ref(database, 'Users/' + currentUser.uid + '/Customers/' + id);

  onValue(refPath, (snap) => {
    const c = snap.val();
    update(refPath, {
      totalCredit: (c.totalCredit || 0) + amount,
      lastPaymentDate: new Date().toLocaleDateString()
    });
  }, { onlyOnce: true });
};

window.addDebit = function(id) {
  const amount = parseInt(document.getElementById("amt_" + id).value);
  if (!amount) return alert("Enter amount");

  const refPath = ref(database, 'Users/' + currentUser.uid + '/Customers/' + id);

  onValue(refPath, (snap) => {
    const c = snap.val();
    update(refPath, {
      totalPaid: (c.totalPaid || 0) + amount,
      lastPaymentDate: new Date().toLocaleDateString()
    });
  }, { onlyOnce: true });
};

/* ---------- BULK PAYMENT ---------- */

bulkCreditBtn.onclick = () => bulkUpdate("credit");
bulkDebitBtn.onclick = () => bulkUpdate("debit");

function bulkUpdate(type) {
  const amount = parseInt(bulkAmount.value);
  if (!amount) return alert("Enter bulk amount");

  const customerRef = ref(database, 'Users/' + currentUser.uid + '/Customers');

  onValue(customerRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    for (let id in data) {
      const c = data[id];
      const refPath = ref(database, 'Users/' + currentUser.uid + '/Customers/' + id);

      if (type === "credit") {
        update(refPath, {
          totalCredit: (c.totalCredit || 0) + amount,
          lastPaymentDate: new Date().toLocaleDateString()
        });
      } else {
        update(refPath, {
          totalPaid: (c.totalPaid || 0) + amount,
          lastPaymentDate: new Date().toLocaleDateString()
        });
      }
    }

    bulkAmount.value = "";
  }, { onlyOnce: true });
}

/* ---------- SEARCH ---------- */

searchBtn.onclick = () => {
  const text = searchInput.value.toLowerCase();
  const items = customerList.getElementsByTagName("li");

  for (let i = 0; i < items.length; i++) {
    const name = items[i].innerText.toLowerCase();
    items[i].style.display = name.includes(text) ? "" : "none";
  }
};

</script>

</body>
</html>
