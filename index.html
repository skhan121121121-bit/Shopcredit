<!DOCTYPE html>
<html>
<head>
  <title>Credit Sass</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #4CAF50;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .balance {
      font-size: 18px;
      font-weight: bold;
      margin: 5px 0;
    }

    .logout {
      background: red;
      margin-top: 20px;
    }

    #dashboard { display: none; }
  </style>
</head>

<body>

<div class="container">

  <div id="authSection">
    <h2>Login / Register</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <div id="dashboard">
    <h2>Credit Sass</h2>

    <input type="text" id="customerName" placeholder="Customer Name">
    <button onclick="addCustomer()">Add Customer</button>

    <div id="customerList"></div>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getDatabase, 
  ref, 
  push, 
  onValue,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjKRBcESWqw17af_TQ8h5RtRz4pRFvcvs",
  authDomain: "credit-sass.firebaseapp.com",
  databaseURL: "https://credit-sass-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "credit-sass",
  storageBucket: "credit-sass.firebasestorage.app",
  messagingSenderId: "820767773664",
  appId: "1:820767773664:web:4eb034cdaaea029fc95185",
  measurementId: "G-0MGF07JQVE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

let currentUser = null;

window.register = function() {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Registered Successfully"))
    .catch(err => alert(err.message));
}

window.login = function() {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(err => alert(err.message));
}

window.logout = function() {
  signOut(auth);
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("authSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadCustomers();
  } else {
    document.getElementById("authSection").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

window.addCustomer = function() {
  if (!customerName.value) return alert("Enter Name");

  push(ref(database, 'Users/' + currentUser.uid + '/Customers'), {
    name: customerName.value,
    totalCredit: 0,
    totalPaid: 0,
    lastPaymentDate: "-"
  });

  customerName.value = "";
}

function loadCustomers() {
  const customerRef = ref(database, 'Users/' + currentUser.uid + '/Customers');

  onValue(customerRef, (snapshot) => {

    const data = snapshot.val();
    const list = document.getElementById("customerList");
    list.innerHTML = "";

    if (!data) return;

    for (let id in data) {
      const c = data[id];
      const balance = (c.totalCredit || 0) - (c.totalPaid || 0);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${c.name}</h3>
        <div class="balance">Balance: ₹${balance}</div>
        <div>Last Payment: ${c.lastPaymentDate}</div>

        <input type="number" placeholder="Amount" id="amt_${id}">
        <button onclick="addCredit('${id}')">Add Credit</button>
        <button onclick="addPaid('${id}')">Add Payment</button>
      `;

      list.appendChild(card);
    }

  });
}

window.addCredit = function(id) {
  const amount = parseInt(document.getElementById("amt_" + id).value);
  if (!amount) return alert("Enter Amount");

  const customerRef = ref(database, 'Users/' + currentUser.uid + '/Customers/' + id);

  onValue(customerRef, (snapshot) => {
    const c = snapshot.val();
    update(customerRef, {
      totalCredit: (c.totalCredit || 0) + amount,
      lastPaymentDate: new Date().toLocaleDateString()
    });
  }, { onlyOnce: true });
}

window.addPaid = function(id) {
  const amount = parseInt(document.getElementById("amt_" + id).value);
  if (!amount) return alert("Enter Amount");

  const customerRef = ref(database, 'Users/' + currentUser.uid + '/Customers/' + id);

  onValue(customerRef, (snapshot) => {
    const c = snapshot.val();
    update(customerRef, {
      totalPaid: (c.totalPaid || 0) + amount,
      lastPaymentDate: new Date().toLocaleDateString()
    });
  }, { onlyOnce: true });
}

</script>

</body>
</html>
