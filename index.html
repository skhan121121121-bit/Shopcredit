<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shop Management</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <style>
    body{font-family:Arial;padding:20px}
    .hidden{display:none}
    button{margin:5px;padding:6px 12px}
    input,select{margin:5px;padding:6px}
    .box{border:1px solid #ccc;padding:15px;margin-top:15px}
  </style>
</head>
<body>

<h2>Shop Management System</h2>

<!-- LOGIN -->
<div id="loginPage" class="box">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h3>Shop Dashboard</h3>

  <!-- GROUP ADD -->
  <div class="box">
    <h4>Add Group</h4>
    <input type="text" id="groupName" placeholder="Group Name">
    <button onclick="addGroup()">Add Group</button>
  </div>

  <!-- CUSTOMER ADD -->
  <div class="box">
    <h4>Add Customer</h4>
    <input type="text" id="custName" placeholder="Customer Name">
    <input type="text" id="custMobile" placeholder="Mobile">
    <select id="custGroup"></select>
    <button onclick="addCustomer()">Add Customer</button>
  </div>

  <!-- BILL CREATE -->
  <div class="box">
    <h4>Create Bill</h4>
    <select id="billCustomer"></select><br>
    <input type="number" id="billAmount" placeholder="Total Amount">
    <input type="number" id="paidAmount" placeholder="Paid Amount">
    <button onclick="createBill()">Generate Bill</button>
  </div>

  <div id="output"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjKRBcESWqw17af_TQ8h5RtRz4pRFvcvs",
  authDomain: "credit-sass.firebaseapp.com",
  databaseURL: "https://credit-sass-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "credit-sass.firebasestorage.app",
  messagingSenderId: "820767773664",
  appId: "1:820767773664:web:4eb034cdaaea029fc9518"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentShop = "";

window.login = function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth,email,pass)
  .then(user=>{
    currentShop = user.user.uid;
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadGroups();
    loadCustomers();
  })
  .catch(()=>alert("Login Failed"));
}

window.addGroup = function(){
  let g = document.getElementById("groupName").value;
  push(ref(db,"shops/"+currentShop+"/groups"),{
    name:g
  });
  alert("Group Added");
  loadGroups();
}

async function loadGroups(){
  let snapshot = await get(ref(db,"shops/"+currentShop+"/groups"));
  let select = document.getElementById("custGroup");
  select.innerHTML="";
  if(snapshot.exists()){
    snapshot.forEach(child=>{
      let opt=document.createElement("option");
      opt.value=child.key;
      opt.textContent=child.val().name;
      select.appendChild(opt);
    });
  }
}

window.addCustomer = function(){
  let name=document.getElementById("custName").value;
  let mobile=document.getElementById("custMobile").value;
  let group=document.getElementById("custGroup").value;

  push(ref(db,"shops/"+currentShop+"/customers"),{
    name:name,
    mobile:mobile,
    group:group
  });

  alert("Customer Added");
  loadCustomers();
}

async function loadCustomers(){
  let snapshot = await get(ref(db,"shops/"+currentShop+"/customers"));
  let select=document.getElementById("billCustomer");
  select.innerHTML="";
  if(snapshot.exists()){
    snapshot.forEach(child=>{
      let opt=document.createElement("option");
      opt.value=child.key;
      opt.textContent=child.val().name;
      select.appendChild(opt);
    });
  }
}

window.createBill = async function(){
  let custId=document.getElementById("billCustomer").value;
  let amount=parseFloat(document.getElementById("billAmount").value);
  let paid=parseFloat(document.getElementById("paidAmount").value);
  let due=amount-paid;

  push(ref(db,"shops/"+currentShop+"/bills"),{
    customer:custId,
    total:amount,
    paid:paid,
    due:due,
    date:new Date().toISOString()
  });

  alert("Bill Generated");

  // WhatsApp reminder
  let custSnap = await get(ref(db,"shops/"+currentShop+"/customers/"+custId));
  let mobile=custSnap.val().mobile;

  let msg=`আপনার ${due} টাকা বাকি আছে। দয়া করে পরিশোধ করুন।`;
  window.open("https://wa.me/91"+mobile+"?text="+encodeURIComponent(msg));
}

</script>
</body>
</html>
