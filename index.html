<!DOCTYPE html>
<html>
<head>
  <title>Credit App</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="message"></p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>

  // 🔥 এখানে তোমার firebaseConfig paste করো
  const firebaseConfig = {
    apiKey: "AIzaSyBjKRBcESWqw17af_TQ8h5RtRz4pRFvcvs",
    authDomain: "credit-sass.firebaseapp.com",
    projectId: "credit-sass",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("message").innerText = "Registered Successfully!";
      })
      .catch(error => {
        document.getElementById("message").innerText = error.message;
      });
  }

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("message").innerText = "Login Success!";
      })
      .catch(error => {
        document.getElementById("message").innerText = error.message;
      });
  }

</script>

</body>
</html>
