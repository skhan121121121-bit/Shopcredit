<!DOCTYPE html>
<html>
<head>
  <title>Credit Sass Mobile UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: Arial; background:#f2f4f8; }
    .container { max-width:600px; margin:auto; padding:15px; }
    h2 { text-align:center; }
    input, button { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
    button { border:none; background:#4CAF50; color:white; font-weight:bold; cursor:pointer; }
    button:hover { opacity:0.9; }
    .card { background:white; padding:12px; margin-top:12px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.15); }
    .balance { font-size:18px; font-weight:bold; margin:5px 0; }
    .balance.positive { color:green; }
    .balance.negative { color:red; }
    .logout { background:red; margin-top:15px; }
    #dashboard { display:none; }
    .top-buttons button { width:48%; display:inline-block; margin-right:2%; margin-top:5px; }
    @media(max-width:480px){ .top-buttons button { width:100%; margin-right:0; } }
  </style>
</head>
<body>
<div class="container">

  <!-- LOGIN / REGISTER -->
  <div id="authSection">
    <h2>Login / Register</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <h2>Credit Sass Mobile</h2>

    <input type="text" id="customerName" placeholder="Customer Name">
    <button onclick="addCustomer()">Add Customer</button>

    <input type="text" id="searchInput" placeholder="Search Customer by Name">
    <button onclick="searchCustomer()">Search</button>

    <input type="number" id="bulkAmount" placeholder="Bulk Amount">
    <div class="top-buttons">
      <button onclick="bulkCredit()">Add Credit All</button>
      <button onclick="bulkPaid()">Add Paid All</button>
    </div>

    <button onclick="downloadCSV()">Export CSV</button>

    <h3>Summary</h3>
    <div id="summary"></div>

    <div id="customerList"></div>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ---------- FIREBASE CONFIG ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyBjKRBcESWqw17af_TQ8h5RtRz4pRFvcvs",
  authDomain: "credit-sass.firebaseapp.com",
  databaseURL: "https://credit-sass-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "credit-sass",
  storageBucket: "credit-sass.firebasestorage.app",
  messagingSenderId: "820767773664",
  appId: "1:820767773664:web:4eb034cdaaea029fc95185",
  measurementId: "G-0MGF07JQVE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);
let currentUser = null;

/* ---------- AUTH ---------- */
window.register = function() {
  createUserWithEmailAndPassword(auth,email.value,password.value)
    .then(()=>alert("Registered Successfully"))
    .catch(err=>alert(err.message));
}
window.login = function() {
  signInWithEmailAndPassword(auth,email.value,password.value)
    .catch(err=>alert(err.message));
}
window.logout = function(){ signOut(auth); }

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    authSection.style.display="none";
    dashboard.style.display="block";
    loadCustomers();
  } else {
    authSection.style.display="block";
    dashboard.style.display="none";
  }
});

/* ---------- CUSTOMER ---------- */
window.addCustomer=function(){
  if(!customerName.value) return alert("Enter Customer Name");
  push(ref(database,'Users/'+currentUser.uid+'/Customers'),{
    name:customerName.value,totalCredit:0,totalPaid:0,lastPaymentDate:"-"
  });
  customerName.value="";
}

/* ---------- LOAD CUSTOMERS ---------- */
function loadCustomers(){
  const customerRef=ref(database,'Users/'+currentUser.uid+'/Customers');
  onValue(customerRef,snap=>{
    const data=snap.val();
    customerList.innerHTML="";
    summary.innerHTML="";
    if(!data) return;

    let totalCredit=0,totalPaid=0,balance=0;

    for(let id in data){
      const c=data[id];
      const bal=(c.totalCredit||0)-(c.totalPaid||0);
      totalCredit+=(c.totalCredit||0);
      totalPaid+=(c.totalPaid||0);
      balance+=bal;

      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <h3>${c.name}</h3>
        <div class="balance ${bal>=0?"positive":"negative"}">Balance: ₹${bal}</div>
        <div>Last Payment: ${c.lastPaymentDate}</div>
        <input type="number" placeholder="Amount" id="amt_${id}">
        <div class="top-buttons">
          <button onclick="addCredit('${id}')">Add Credit</button>
          <button onclick="addPaid('${id}')">Add Paid</button>
          <button onclick="sendWhatsApp('${id}')">WhatsApp</button>
        </div>
      `;
      customerList.appendChild(card);
    }

    summary.innerHTML=`Total Credit: ₹${totalCredit} | Total Paid: ₹${totalPaid} | Total Balance: ₹${balance}`;
  });
}

/* ---------- INDIVIDUAL PAYMENT ---------- */
window.addCredit=function(id){
  const amt=parseInt(document.getElementById("amt_"+id).value);
  if(!amt) return alert("Enter Amount");
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers/'+id);
  onValue(custRef,snap=>{
    const c=snap.val();
    update(custRef,{totalCredit:(c.totalCredit||0)+amt,lastPaymentDate:new Date().toLocaleDateString()});
  },{onlyOnce:true});
}

window.addPaid=function(id){
  const amt=parseInt(document.getElementById("amt_"+id).value);
  if(!amt) return alert("Enter Amount");
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers/'+id);
  onValue(custRef,snap=>{
    const c=snap.val();
    update(custRef,{totalPaid:(c.totalPaid||0)+amt,lastPaymentDate:new Date().toLocaleDateString()});
  },{onlyOnce:true});
}

/* ---------- BULK PAYMENT ---------- */
window.bulkCredit=function(){
  const amt=parseInt(bulkAmount.value); if(!amt) return alert("Enter Bulk Amount");
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers');
  onValue(custRef,snap=>{
    const data=snap.val();
    for(let id in data){ update(ref(database,'Users/'+currentUser.uid+'/Customers/'+id),
      {totalCredit:(data[id].totalCredit||0)+amt,lastPaymentDate:new Date().toLocaleDateString()}); }
  },{onlyOnce:true});
  bulkAmount.value="";
}

window.bulkPaid=function(){
  const amt=parseInt(bulkAmount.value); if(!amt) return alert("Enter Bulk Amount");
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers');
  onValue(custRef,snap=>{
    const data=snap.val();
    for(let id in data){ update(ref(database,'Users/'+currentUser.uid+'/Customers/'+id),
      {totalPaid:(data[id].totalPaid||0)+amt,lastPaymentDate:new Date().toLocaleDateString()}); }
  },{onlyOnce:true});
  bulkAmount.value="";
}

/* ---------- SEARCH ---------- */
window.searchCustomer=function(){
  const text=searchInput.value.toLowerCase();
  const items=customerList.getElementsByClassName("card");
  for(let i=0;i<items.length;i++){
    const name=items[i].querySelector("h3").innerText.toLowerCase();
    items[i].style.display=name.includes(text)?"":"none";
  }
}

/* ---------- WhatsApp Reminder ---------- */
window.sendWhatsApp=function(id){
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers/'+id);
  onValue(custRef,snap=>{
    const c=snap.val();
    const bal=(c.totalCredit||0)-(c.totalPaid||0);
    const msg=`Hello ${c.name}, your pending balance is ₹${bal}`;
    const url=`https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
  },{onlyOnce:true});
}

/* ---------- CSV EXPORT ---------- */
window.downloadCSV=function(){
  const custRef=ref(database,'Users/'+currentUser.uid+'/Customers');
  onValue(custRef,snap=>{
    const data=snap.val(); if(!data) return;
    let csv="Name,Total Credit,Total Paid,Balance,Last Payment Date\n";
    for(let id in data){
      const c=data[id]; const bal=(c.totalCredit||0)-(c.totalPaid||0);
      csv+=`${c.name},${c.totalCredit||0},${c.totalPaid||0},${bal},${c.lastPaymentDate}\n`;
    }
    const blob=new Blob([csv],{type:'text/csv'});
    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="customers.csv";
    link.click();
  },{onlyOnce:true});
}

</script>
</body>
</html>
